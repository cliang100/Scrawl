<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrawl - Lobby</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Scrawl</h1>
        <p>Multiplayer drawing game</p>
        
        <!-- Player Setup -->
        <div class="player-setup">
            <div class="setup-group">
                <label for="playerName">Your Name:</label>
                <input type="text" id="playerName" placeholder="Enter your name" maxlength="12">
            </div>
            <div class="setup-group">
                <label>Choose Avatar:</label>
                <div class="avatar-selection">
                    <div class="avatar-option" data-avatar="🎨">🎨</div>
                    <div class="avatar-option" data-avatar="🦊">🦊</div>
                    <div class="avatar-option" data-avatar="🐱">🐱</div>
                    <div class="avatar-option" data-avatar="🐶">🐶</div>
                    <div class="avatar-option" data-avatar="🦄">🦄</div>
                    <div class="avatar-option" data-avatar="🐼">🐼</div>
                    <div class="avatar-option" data-avatar="🦋">🦋</div>
                    <div class="avatar-option" data-avatar="🐸">🐸</div>
                </div>
            </div>
        </div>
        
        <div class="room-actions">
            <button onclick="createRoom()">Create Room</button>
            <div class="join-room">
                <input type="text" id="roomCode" placeholder="Enter room code" maxlength="6">
                <button onclick="joinRoom()">Join Room</button>
            </div>
        </div>
        
        <div id="roomInfo" class="hidden">
            <h3>Room Code: <span id="currentRoomCode"></span></h3>
            <div id="playersSection">
                <h4>Players:</h4>
                <ul id="playerList"></ul>
            </div>
            <button onclick="startGame()" id="startGameBtn">Start Game</button>
        </div>
    </div>
    
    <script src="/static/js/socket.js"></script>
    <script src="/static/js/game.js"></script>
</body>
</html>
