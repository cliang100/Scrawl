<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrawl - Game</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="game-container">
        <h1>Game Room</h1>
        
        <!-- Game Info -->
        <div class="game-info">
            <div class="players-section">
                <h3>Players</h3>
                <ul id="gamePlayerList"></ul>
            </div>
            <div class="turn-info">
                <h3 id="turnStatus">Waiting for game to start...</h3>
                <div id="wordDisplay"></div>
            </div>
        </div>
        
        <!-- Drawing Tools -->
        <div class="drawing-tools">
            <div class="tool-group">
                <label>Color:</label>
                <input type="color" id="colorPicker" value="#000000">
            </div>
            <div class="tool-group">
                <label>Size:</label>
                <input type="range" id="brushSize" min="1" max="20" value="2">
                <span id="sizeDisplay">2</span>
            </div>
            <div class="tool-group">
                <button id="clearCanvas">Clear</button>
            </div>
        </div>
        
        <!-- Canvas -->
        <canvas id="drawingCanvas"></canvas>
        
        <!-- Chat -->
        <div class="chat">
            <input type="text" id="guessInput" placeholder="Type your guess...">
            <button onclick="sendGuess()">Send</button>
        </div>
    </div>
    
    <script src="/static/js/socket.js"></script>
    <script src="/static/js/canvas.js"></script>
    <script src="/static/js/game.js"></script>
    <script>
        connectWebSocket();
        // Initialize game UI after a short delay to ensure WebSocket is ready
        setTimeout(() => {
            if (window.currentPlayers) {
                window.updateGameUI();
            }
        }, 100);
        
            </script>
</body>
</html>
